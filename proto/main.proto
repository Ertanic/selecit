syntax = "proto3";

package main;

service Excavator {
  rpc RunExcavator (stream ExcavatorHeartbeat) returns (stream ExcavatorRequest);
}

message ExcavatorHeartbeat {}

message ExcavatorCommand {
  string name = 1;
  repeated string args = 2;
}

message ExcavatorResponse {
  int64 code = 1;
  string output = 2;
}

message ExcavatorRequest {
  oneof request {
    ExcavatorCommand command = 1;
    ExcavatorResponse response = 2;
  }
}